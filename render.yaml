# render.yaml — Docker web service + Render PostgreSQL
#
# Do not put secrets in this file. Set BETTER_AUTH_SECRET and related values
# in the Render dashboard.
#
# https://render.com/docs/blueprint-spec

databases:
  - name: oscal-control-tool-db
    plan: basic-256mb
    region: oregon

services:
  - type: web
    name: oscal-control-tool
    runtime: docker
    plan: starter
    region: oregon
    branch: main
    healthCheckPath: /api/health
    numInstances: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: oscal-control-tool-db
          property: connectionString
      - key: BETTER_AUTH_URL
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: BETTER_AUTH_SECRET
        generateValue: true
      - key: SEED_DEMO_PROJECT
        value: "false"
      - key: SEED_DEMO_ORG_SLUG
        value: demo-organization
